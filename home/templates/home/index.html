<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Welcome Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .container{
            background:white;
            padding:50px;
            width:400px;
            text-align:center;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            color:#0077ff;
            margin-bottom:20px;
            font-size:40px;
        }

        p{
            color:#555;
            font-size:18px;
            margin-bottom:30px;
            line-height:1.5;
        }

        .btn{
            display:inline-block;
            padding:12px 30px;
            background:#0077ff;
            color:white;
            text-decoration:none;
            border-radius:30px;
            transition:0.3s;
            font-weight:bold;
        }

        .btn:hover{
            background:#0056cc;
            transform:scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome</h1>
        <h2> Hi {{name}}</h2>

        <p>
            Welcome to our website.  
            We are happy to have you here.
        </p>

        <a href="#" class="btn">Explore More</a>
    </div>

</body>
</html>
