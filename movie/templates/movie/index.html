<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bootstrap Table</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>
<body>

  <div class="container mt-5">
    <h2 class="mb-4">Movie Table</h2>

    <table class="table table-bordered table-striped table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Name  </th>
          <th> Category </th>
          <th>Release Date</th>
          <th>Language</th>
          
        </tr>
      </thead>
      <tbody>
        {% for i in movie %}
        <tr>
          <td>{{i.id}}</td>
          <td>{{i.name}}</td>
          <td>
            {%for j in i.category.all%}
            <button> {{j.name}} </button> ## manytomany ma matrai yesto garnu parxa aru ma pardaina
            {% endfor %}
            </td>
          <td>{{i.release_date}}</td>
          <td>{{i.language}}</td>
          
        </tr>
        {% endfor %}

      </tbody>
    </table>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
